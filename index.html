<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#aee7ff">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>ぱくぱくフレンズ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; touch-action: manipulation; }
  body {
    font-family: "Hiragino Maru Gothic ProN", "BIZ UDGothic", "Yu Gothic", sans-serif;
    background: linear-gradient(#aee7ff, #fdf6d8);
    user-select: none; -webkit-user-select: none;
    height: 100dvh; /* URLバーを除いた実際の表示領域に合わせる */
  }

  .screen {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center;
    padding: max(8px, env(safe-area-inset-top)) 12px max(10px, env(safe-area-inset-bottom));
    overflow-y: auto;
  }
  .screen.active { display: flex; }

  h1 { font-size: min(6.5vw, 30px); color: #ff7ab0; text-shadow: 2px 2px 0 #fff; margin: 2px 0; }
  .subtitle { font-size: 4vw; color: #7a6a58; margin-bottom: 6px; }

  /* ===== キャラクター ===== */
  .char-wrap { position: relative; width: 56vw; max-width: 260px; aspect-ratio: 1; margin: 10px auto; container-type: inline-size; }
  .char-hat {
    position: absolute; top: -6%; left: 50%;
    transform: translateX(-50%) rotate(-8deg);
    font-size: 34cqw; line-height: 1; z-index: 7; pointer-events: none;
  }
  .char-body {
    position: absolute; inset: 0; border-radius: 48% 48% 44% 44%;
    background: radial-gradient(circle at 35% 30%, #ffe08a, #ffb84d);
    box-shadow: inset -8px -10px 0 rgba(0,0,0,.06);
    animation: bounce 2.4s ease-in-out infinite;
  }
  @keyframes bounce { 0%,100%{transform:translateY(0) scale(1);} 50%{transform:translateY(-4%) scale(1.02,.98);} }
  .eye {
    position: absolute; top: 32%; width: 11%; height: 15%;
    background: #4a3b2a; border-radius: 50%; transition: height .3s;
  }
  .eye::after { content:""; position:absolute; top:15%; left:20%; width:35%; height:35%; background:#fff; border-radius:50%; }
  .eye.l { left: 26%; } .eye.r { right: 26%; }
  .char.sleeping .eye { height: 3%; border-radius: 4px; }
  .char.sleeping .eye::after { display: none; }
  .cheek { position: absolute; top: 50%; width: 13%; height: 8%; background: #ffb3c1; border-radius: 50%; opacity:.8; }
  .cheek.l { left: 14%; } .cheek.r { right: 14%; }
  .mouth {
    position: absolute; top: 55%; left: 50%; transform: translateX(-50%);
    width: 22%; height: 12%; background: #a8442f; border-radius: 0 0 50% 50%;
    overflow: hidden; transition: all .2s;
  }
  .mouth::after { content:""; position:absolute; bottom:-30%; left:15%; width:70%; height:60%; background:#ff8c7a; border-radius:50%; }
  .char.open .mouth { height: 26%; border-radius: 40%; }
  .char.happy .mouth { height: 18%; border-radius: 0 0 50% 50%; }
  .char.sleeping .mouth { height: 6%; width: 10%; border-radius: 50%; }

  /* ===== ホーム ===== */
  #screen-home .char-wrap { width: 36vw; max-width: 160px; margin: 4px auto; }
  .stamp-card {
    display: flex; gap: 8px; background: #fff; border: 3px dashed #ffb84d;
    border-radius: 16px; padding: 7px 12px; margin: 2px 0 8px;
  }
  .stamp { font-size: min(7.5vw, 34px); filter: grayscale(1) opacity(.3); transition: all .3s; }
  .stamp.done { filter: none; transform: scale(1.15); }
  .menu { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; max-width: 420px; margin-top: 2px; }
  .menu button {
    font-family: inherit; font-size: min(4.2vw, 18px); padding: 3.5vw 1vw; border: none; border-radius: 18px;
    background: #fff; box-shadow: 0 4px 0 rgba(0,0,0,.12); color: #5a4a38;
    display: flex; flex-direction: column; align-items: center; gap: 4px;
  }
  .menu button .icon { font-size: min(9vw, 40px); }
  .menu button:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,.12); }
  .menu button.done-badge { outline: 3px solid #7ed957; }
  .menu button.done-badge::after { content: "✅"; font-size: min(3.6vw, 15px); }
  .day-label { font-size: min(4.2vw, 18px); color: #7a6a58; background:#fff; border-radius: 999px; padding: 3px 16px; }

  /* ===== 共通:あそびエリア ===== */
  .play-area {
    position: relative; width: 100%; max-width: 420px; flex: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
  }
  .back-btn, .skip-btn {
    position: absolute; top: max(10px, env(safe-area-inset-top)); left: 12px; z-index: 30;
    font-family: inherit; font-size: 5vw; border: none; border-radius: 999px;
    background: #fff; padding: 8px 16px; box-shadow: 0 3px 0 rgba(0,0,0,.15); color: #7a6a58;
  }
  .skip-btn { left: auto; right: 12px; }
  .guide { font-size: 4.8vw; color: #5a4a38; background: rgba(255,255,255,.85); border-radius: 14px; padding: 8px 14px; text-align: center; }

  /* ===== ごはん ===== */
  .food-tray { display: flex; gap: 5vw; margin-top: 12px; }
  .food { font-size: 14vw; background: none; border: none; transition: transform .1s; }
  .food:active { transform: scale(1.2); }
  .food.eaten { visibility: hidden; }
  .flying-food { position: fixed; font-size: 14vw; z-index: 40; pointer-events: none; transition: all .5s ease-in; }

  /* ===== はみがき ===== */
  .teeth-mouth {
    position: relative; width: 80vw; max-width: 360px; height: 34vw; max-height: 160px;
    background: #a8442f; border-radius: 24px; margin-top: 10px; overflow: hidden; touch-action: none;
  }
  .tooth-row { position: absolute; top: 0; left: 6%; width: 88%; height: 42%; display: flex; gap: 2%; }
  .tooth { flex: 1; background: #fffdf5; border-radius: 0 0 40% 40%; box-shadow: inset 0 -3px 0 rgba(0,0,0,.08); }
  .germ { position: absolute; font-size: 8vw; transition: transform .15s, opacity .2s; z-index: 2; }
  .germ.dead { transform: scale(0); opacity: 0; }
  .brush { position: fixed; font-size: 13vw; z-index: 41; pointer-events: none; transform: translate(-30%, -70%) rotate(-30deg); display: none; }

  /* ===== おふろ ===== */
  .bath-zone { position: relative; touch-action: none; }
  .dirt { position: absolute; font-size: 7vw; z-index: 3; transition: opacity .3s, transform .3s; }
  .dirt.clean { opacity: 0; transform: scale(0); }
  .bubble { position: absolute; font-size: 6vw; z-index: 4; pointer-events: none; animation: pop-in .25s; }
  @keyframes pop-in { from { transform: scale(0); } to { transform: scale(1); } }
  .shower-btn {
    font-size: 14vw; width: 24vw; height: 24vw; max-width: 110px; max-height: 110px;
    border: none; border-radius: 50%; background: #6ec6ff; box-shadow: 0 5px 0 #3d9be0;
    margin-top: 10px; display: flex; align-items: center; justify-content: center;
    animation: pulse-btn 1s ease-in-out infinite;
  }
  @keyframes pulse-btn { 0%,100%{transform:scale(1);} 50%{transform:scale(1.18);} }
  .drop { position: fixed; font-size: 7vw; z-index: 42; pointer-events: none; animation: fall .8s linear forwards; }
  @keyframes fall { to { transform: translateY(90vh); opacity: 0; } }

  /* ===== ねんね ===== */
  #screen-sleep.night { background: linear-gradient(#1a2350, #3b3560); }
  #screen-sleep.night .guide { background: rgba(255,255,255,.2); color: #fff; }
  .light-switch { font-family: inherit; font-size: 14vw; background: none; border: none; margin-top: 14px; transition: transform .1s; }
  .light-switch:active { transform: scale(1.15); }
  .light-switch.rise { animation: sunrise 1.6s ease; }
  @keyframes sunrise {
    from { transform: translateY(14vw) scale(.4); opacity: .2; }
    60% { transform: translateY(-4vw) scale(1.3); opacity: 1; }
    to { transform: translateY(0) scale(1); }
  }
  #screen-sleep { transition: background 1s; }
  .zzz { position: absolute; top: 6%; right: 8%; font-size: 8vw; color: #cfd8ff; display: none; animation: floatz 2s ease-in-out infinite; }
  @keyframes floatz { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-12px);} }
  .star { position: absolute; font-size: 5vw; animation: twinkle 1.6s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.3;} 50%{opacity:1;} }

  /* ===== おかたづけ ===== */
  .toy { position: absolute; font-size: 16vw; background: none; border: none; z-index: 5; transition: transform .1s; }
  .toy:active { transform: scale(1.2); }
  .toy.stored { visibility: hidden; }
  .toy-box { font-size: 26vw; margin-top: 2px; transition: transform .2s; }
  .toy-box.bounce { transform: scale(1.2); }
  .flying-toy { position: fixed; font-size: 16vw; z-index: 40; pointer-events: none; transition: all .5s ease-in; }

  /* ===== ずかん ===== */
  .zukan-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    width: 100%; max-width: 400px; margin-top: 14px;
  }
  .zukan-slot {
    aspect-ratio: 1; background: #fff; border-radius: 18px; box-shadow: 0 3px 0 rgba(0,0,0,.1);
    display: flex; align-items: center; justify-content: center; font-size: 11vw;
    border: none; font-family: inherit;
  }
  .zukan-slot.locked { filter: grayscale(1) opacity(.35); font-size: 8vw; }
  .zukan-slot.hop { animation: friend-hop .5s; }
  @keyframes friend-hop {
    0% { transform: scale(1); }
    40% { transform: scale(1.3) rotate(-8deg); }
    70% { transform: scale(1.1) rotate(6deg); }
    100% { transform: scale(1); }
  }
  .zukan-count { font-size: 5vw; color: #7a6a58; margin-top: 12px; background: #fff; border-radius: 999px; padding: 6px 20px; }
  .home-btn {
    font-family: inherit; font-size: min(5.5vw, 24px); margin-top: 16px; padding: 12px 44px;
    border: none; border-radius: 999px; background: #ff9f43; color: #fff; box-shadow: 0 5px 0 #d97e20;
  }
  .home-btn:active { transform: translateY(4px); box-shadow: 0 1px 0 #d97e20; }

  /* ===== ホームにあそびにくるおともだち ===== */
  .home-friend {
    position: absolute; font-size: min(8vw, 36px); background: none; border: none; z-index: 6;
    animation: bob 2.2s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }
  .home-friend.hop { animation: friend-hop .5s; }

  /* ===== おうえんに くる おともだち(あそび画面) ===== */
  .cheer-friend {
    position: absolute; left: 3%; bottom: 3%; z-index: 6;
    font-size: min(10vw, 44px); background: none; border: none;
    animation: bob 2.2s ease-in-out infinite;
  }
  .cheer-friend.hop { animation: friend-hop .5s; }

  /* ===== ふうせんわり(ごほうび) ===== */
  #balloon-zone { position: relative; flex: 1; width: 100%; }
  .balloon {
    position: absolute; width: 17vw; height: 21vw; max-width: 84px; max-height: 104px;
    border: none; border-radius: 50% 50% 47% 47%;
    animation: bob 2.6s ease-in-out infinite;
  }
  .balloon::after { content: ""; position: absolute; left: 50%; top: 99%; width: 2px; height: 9vw; background: #9c8a76; }
  .balloon.popped { transition: transform .18s, opacity .18s; transform: scale(1.7); opacity: 0; pointer-events: none; }

  /* ===== おいわい ===== */
  #celebrate {
    position: absolute; inset: 0; z-index: 100; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(255, 240, 200, .95); text-align: center;
  }
  #celebrate.active { display: flex; }
  #celebrate h2 { font-size: 8vw; color: #ff7ab0; margin-bottom: 10px; }
  #celebrate .big { font-size: 22vw; animation: bounce 1s infinite; }
  #celebrate button {
    font-family: inherit; font-size: 6vw; margin-top: 20px; padding: 14px 34px;
    border: none; border-radius: 999px; background: #ff9f43; color: #fff; box-shadow: 0 5px 0 #d97e20;
  }
  .confetti { position: fixed; top: -10vh; font-size: 6vw; z-index: 101; pointer-events: none; animation: fall 2.4s linear forwards; }

  .praise {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%,-50%) scale(0);
    font-size: 10vw; color: #ff7ab0; text-shadow: 2px 2px 0 #fff; z-index: 60;
    pointer-events: none; transition: transform .25s;
  }
  .praise.show { transform: translate(-50%,-50%) scale(1); }
</style>
</head>
<body>

<!-- ホーム -->
<div id="screen-home" class="screen active">
  <h1>ぱくぱくフレンズ</h1>
  <div class="day-label"><span id="day-num">1</span>にちめ</div>
  <div class="char-wrap"><div class="char" id="char-home">
    <div class="char-body"></div><div class="eye l"></div><div class="eye r"></div>
    <div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div>
  </div></div>
  <div class="stamp-card">
    <span class="stamp" data-task="meal">🍚</span>
    <span class="stamp" data-task="teeth">🪥</span>
    <span class="stamp" data-task="bath">🛁</span>
    <span class="stamp" data-task="tidy">🧸</span>
    <span class="stamp" data-task="sleep">🌙</span>
  </div>
  <div class="menu">
    <button data-go="meal"><span class="icon">🍚</span>ごはん</button>
    <button data-go="teeth"><span class="icon">🪥</span>はみがき</button>
    <button data-go="bath"><span class="icon">🛁</span>おふろ</button>
    <button data-go="tidy"><span class="icon">🧸</span>おかたづけ</button>
    <button data-go="sleep"><span class="icon">🌙</span>ねんね</button>
    <button data-go="zukan" style="background:#fff3f8"><span class="icon">📖</span>ずかん</button>
  </div>
</div>

<!-- ごはん -->
<div id="screen-meal" class="screen">
  <button class="back-btn">← もどる</button>
  <div class="play-area">
    <div class="guide">たべものを タッチして たべさせてね</div>
    <div class="char-wrap"><div class="char" id="char-meal">
      <div class="char-body"></div><div class="eye l"></div><div class="eye r"></div>
      <div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div>
    </div></div>
    <div class="food-tray" id="food-tray"></div>
  </div>
</div>

<!-- はみがき -->
<div id="screen-teeth" class="screen">
  <button class="back-btn">← もどる</button>
  <div class="play-area">
    <div class="guide">はを ゆびで こすって ばいきんを やっつけよう!</div>
    <div class="char-wrap" style="width:40vw"><div class="char open" id="char-teeth">
      <div class="char-body"></div><div class="eye l"></div><div class="eye r"></div>
      <div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div>
    </div></div>
    <div class="teeth-mouth" id="teeth-mouth">
      <div class="tooth-row">
        <div class="tooth"></div><div class="tooth"></div><div class="tooth"></div>
        <div class="tooth"></div><div class="tooth"></div><div class="tooth"></div>
      </div>
    </div>
  </div>
  <div class="brush" id="brush">🪥</div>
</div>

<!-- おふろ -->
<div id="screen-bath" class="screen">
  <button class="back-btn">← もどる</button>
  <div class="play-area">
    <div class="guide" id="bath-guide">からだを なでなでして あわあわ にしてね</div>
    <div class="char-wrap bath-zone" id="bath-zone"><div class="char" id="char-bath">
      <div class="char-body"></div><div class="eye l"></div><div class="eye r"></div>
      <div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div>
    </div></div>
    <button class="shower-btn" id="shower-btn" style="visibility:hidden">🚿</button>
  </div>
</div>

<!-- ねんね -->
<div id="screen-sleep" class="screen">
  <button class="back-btn">← もどる</button>
  <div class="play-area">
    <div class="guide" id="sleep-guide">でんきを けして ねんねさせてあげよう</div>
    <div class="zzz" id="zzz">💤</div>
    <div class="char-wrap"><div class="char" id="char-sleep">
      <div class="char-body"></div><div class="eye l"></div><div class="eye r"></div>
      <div class="cheek l"></div><div class="cheek r"></div><div class="mouth"></div>
    </div></div>
    <button class="light-switch" id="light-switch">💡</button>
  </div>
</div>

<!-- おかたづけ -->
<div id="screen-tidy" class="screen">
  <button class="back-btn">← もどる</button>
  <div class="play-area">
    <div class="guide">おもちゃを タッチして はこに おかたづけしよう!</div>
    <div class="char-wrap bath-zone" id="tidy-zone" style="width:80vw;max-width:380px;flex:1;max-height:50vh"></div>
    <div class="toy-box" id="toy-box">🧺</div>
  </div>
</div>

<!-- ずかん -->
<div id="screen-zukan" class="screen">
  <button class="back-btn">← もどる</button>
  <div class="play-area">
    <h1 style="font-size:6vw">おともだち ずかん</h1>
    <div class="guide">1にち がんばると おともだちが ふえるよ</div>
    <div class="zukan-grid" id="zukan-grid"></div>
    <div class="zukan-count" id="zukan-count"></div>
    <button class="home-btn" id="zukan-home-btn">🏠 もどる</button>
  </div>
</div>

<!-- ふうせんわり(1にちクリアのごほうび) -->
<div id="screen-balloon" class="screen">
  <button class="skip-btn" id="balloon-skip">つぎへ →</button>
  <div class="play-area">
    <div class="guide">ごほうび! ふうせんを ぜんぶ わってね 🎈</div>
    <div id="balloon-zone"></div>
  </div>
</div>

<!-- 1にちクリア -->
<div id="celebrate" class="screen">
  <h2>きょうも ぜんぶ できたね!</h2>
  <div class="big" id="celebrate-icon">🎉</div>
  <div class="guide" id="new-friend-msg" style="margin-top:10px"></div>
  <button id="next-day-btn">つぎのひへ →</button>
</div>

<div class="praise" id="praise">💮 できた!</div>

<script>
(() => {
  // ---------- 状態 ----------
  const tasks = { meal: false, teeth: false, bath: false, tidy: false, sleep: false };
  let day = Number(localStorage.getItem('pakupaku-day') || 1);
  const allFriends = ['🐰', '🐱', '🐶', '🐼', '🐨', '🦁', '🐸', '🐧', '🦊', '🐹', '🐻', '🐤'];
  let friends = JSON.parse(localStorage.getItem('pakupaku-zukan') || '[]');

  // ---------- サウンド(WebAudio) ----------
  let ctx;
  function audio() { return ctx ||= new (window.AudioContext || window.webkitAudioContext)(); }
  function tone(freq, dur = .15, delay = 0, type = 'sine', vol = .25) {
    const a = audio(), o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(vol, a.currentTime + delay);
    g.gain.exponentialRampToValueAtTime(.001, a.currentTime + delay + dur);
    o.connect(g).connect(a.destination);
    o.start(a.currentTime + delay); o.stop(a.currentTime + delay + dur);
  }
  const sfx = {
    tap: () => tone(600, .08),
    eat: () => { tone(300, .08, 0, 'square', .15); tone(200, .1, .09, 'square', .15); },
    pop: () => tone(900, .1, 0, 'triangle'),
    scrub: () => tone(400 + Math.random() * 300, .05, 0, 'triangle', .1),
    stamp: () => [523, 659, 784].forEach((f, i) => tone(f, .18, i * .12)),
    fanfare: () => [523, 659, 784, 1047, 784, 1047].forEach((f, i) => tone(f, .22, i * .15, 'triangle', .3)),
    night: () => [660, 550, 440].forEach((f, i) => tone(f, .4, i * .35, 'sine', .15)),
  };

  // ---------- 音声よみあげ ----------
  // 日本語の合成音声は不自然なため使わない(案内は画面表示のみ)
  function speak() {}
  // 英語は自然に聞こえるので、褒め言葉と食べ物の名前だけ明るい声で読み上げる
  let enVoice = null;
  function pickEnVoice() {
    const vs = speechSynthesis.getVoices().filter(v => v.lang.replace('_', '-').startsWith('en'));
    enVoice = vs.find(v => /Samantha|Google US English/i.test(v.name)) || vs[0] || null;
  }
  if ('speechSynthesis' in window) {
    pickEnVoice();
    speechSynthesis.onvoiceschanged = pickEnVoice;
  }
  // queue=true なら前の読み上げを消さずに続けて話す(名前→カウント等)
  function speakEn(text, queue) {
    if (!('speechSynthesis' in window)) return;
    if (!queue) speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(text);
    u.lang = 'en-US';
    if (enVoice) u.voice = enVoice;
    u.rate = .9; u.pitch = 1.4; // ゆっくり・高めで、こわくない明るい声に
    speechSynthesis.speak(u);
  }

  // ---------- 画面切り替え ----------
  const screens = document.querySelectorAll('.screen');
  function show(name) {
    screens.forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + name).classList.add('active');
  }
  const guides = {
    meal: 'たべものを タッチして たべさせてね',
    teeth: 'はを ゆびで こすって ばいきんを やっつけよう',
    bath: 'からだを なでなでして あわあわに してね',
    tidy: 'おもちゃを タッチして はこに おかたづけしよう',
    sleep: 'でんきを けして ねんねさせてあげよう',
  };
  document.querySelectorAll('.menu button').forEach(btn => {
    btn.addEventListener('click', () => {
      const go = btn.dataset.go;
      sfx.tap(); show(go); speak(guides[go]);
      if (go === 'meal') setupMeal();
      if (go === 'teeth') setupTeeth();
      if (go === 'bath') setupBath();
      if (go === 'tidy') setupTidy();
      if (go === 'sleep') setupSleep();
      if (go === 'zukan') renderZukan();
      if (go in tasks) addCheerFriend(go);
    });
  });
  document.querySelectorAll('.back-btn').forEach(b =>
    b.addEventListener('click', () => { sfx.tap(); goHome(); }));

  function goHome() {
    document.getElementById('screen-sleep').classList.remove('night');
    show('home'); renderHome();
  }

  function renderHome() {
    document.getElementById('day-num').textContent = day;
    document.querySelectorAll('.stamp').forEach(s =>
      s.classList.toggle('done', tasks[s.dataset.task]));
    document.querySelectorAll('.menu button').forEach(b =>
      b.classList.toggle('done-badge', tasks[b.dataset.go]));
    renderHomeFriends();
    applyHats();
  }

  // ---------- 🎀 ぼうし(にっすうで きせかえが ふえる) ----------
  const hatLevels = [[10, '👑'], [7, '🎩'], [5, '🧢'], [3, '🎀']];
  function applyHats() {
    const hat = (hatLevels.find(([d]) => day >= d) || [0, ''])[1];
    document.querySelectorAll('.char').forEach(c => {
      let el = c.querySelector('.char-hat');
      if (!el) {
        el = document.createElement('div');
        el.className = 'char-hat';
        c.appendChild(el);
      }
      el.textContent = hat;
    });
  }

  // ---------- 🐰 おともだちが おうえんに くる ----------
  function addCheerFriend(screenName) {
    const area = document.querySelector('#screen-' + screenName + ' .play-area');
    area.querySelectorAll('.cheer-friend').forEach(f => f.remove());
    if (!friends.length) return;
    const f = friends[Math.floor(Math.random() * friends.length)];
    const b = document.createElement('button');
    b.className = 'cheer-friend'; b.textContent = f;
    b.addEventListener('click', () => {
      b.classList.remove('hop');
      void b.offsetWidth;
      b.classList.add('hop');
      sfx.pop(); speakEn(friendNames[f] + '!');
    });
    area.appendChild(b);
  }

  // ずかんで なかまになった おともだちが ホームにあそびにくる
  function renderHomeFriends() {
    const wrap = document.querySelector('#screen-home .char-wrap');
    wrap.querySelectorAll('.home-friend').forEach(f => f.remove());
    const picks = [...friends].sort(() => Math.random() - .5).slice(0, 4);
    const spots = [['-26%', '6%'], ['104%', '2%'], ['-30%', '56%'], ['108%', '52%']];
    picks.forEach((f, i) => {
      const b = document.createElement('button');
      b.className = 'home-friend'; b.textContent = f;
      b.style.left = spots[i][0]; b.style.top = spots[i][1];
      b.style.animationDelay = (i * .4) + 's';
      b.addEventListener('click', () => {
        b.classList.add('hop');
        setTimeout(() => b.classList.remove('hop'), 550);
        sfx.pop(); speakEn(friendNames[f] + '!');
      });
      wrap.appendChild(b);
    });
  }

  // ---------- できた!演出 ----------
  const praiseEl = document.getElementById('praise');
  const praiseWords = [
    ['できた!', 'You did it!'],
    ['すごい!', 'Great job!'],
    ['えらいね!', 'Awesome!'],
    ['やったね!', 'Wonderful!'],
    ['かっこいい!', 'Fantastic!'],
    ['がんばったね!', 'Well done!'],
  ];
  function completeTask(name) {
    tasks[name] = true;
    sfx.stamp();
    const [jp, en] = praiseWords[Math.floor(Math.random() * praiseWords.length)];
    praiseEl.textContent = '💮 ' + jp;
    praiseEl.classList.add('show');
    speakEn(en, true); // 直前のカウント("Three!"等)を消さずに続ける
    const cheer = document.querySelector('.screen.active .cheer-friend');
    if (cheer) {
      cheer.classList.remove('hop');
      void cheer.offsetWidth;
      cheer.classList.add('hop');
    }
    setTimeout(() => {
      praiseEl.classList.remove('show');
      if (Object.values(tasks).every(Boolean)) celebrate();
      else goHome();
    }, 1600);
  }

  function celebrate() {
    show('home');
    // ごほうび:まだ図鑑にいないおともだちを1匹なかまに
    const remaining = allFriends.filter(f => !friends.includes(f));
    const msg = document.getElementById('new-friend-msg');
    const icon = document.getElementById('celebrate-icon');
    if (remaining.length) {
      const newFriend = remaining[Math.floor(Math.random() * remaining.length)];
      friends.push(newFriend);
      localStorage.setItem('pakupaku-zukan', JSON.stringify(friends));
      icon.textContent = newFriend;
      msg.textContent = 'あたらしい おともだちが きたよ! ずかんを みてみてね 📖';
    } else {
      icon.textContent = '🎉';
      msg.textContent = 'おともだち ぜんいん あつまったよ! すごい!';
    }
    document.getElementById('celebrate').classList.add('active');
    sfx.fanfare();
    speak('きょうも ぜんぶ できたね! おめでとう!');
    for (let i = 0; i < 24; i++) {
      const c = document.createElement('div');
      c.className = 'confetti';
      c.textContent = ['🎉', '⭐', '💮', '🌸'][i % 4];
      c.style.left = Math.random() * 100 + 'vw';
      c.style.animationDelay = Math.random() * 1.2 + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }
  }
  document.getElementById('next-day-btn').addEventListener('click', () => {
    document.getElementById('celebrate').classList.remove('active');
    sfx.tap(); show('balloon'); setupBalloons();
  });

  function advanceDay() {
    day++; localStorage.setItem('pakupaku-day', day);
    Object.keys(tasks).forEach(k => tasks[k] = false);
    goHome();
  }
  document.getElementById('balloon-skip').addEventListener('click', () => { sfx.tap(); advanceDay(); });

  // ---------- 🎈 ふうせんわり(ごほうびミニゲーム・いろの えいご) ----------
  const balloonColors = [
    ['#ff5a5a', 'Red'], ['#5aa0ff', 'Blue'], ['#ffd75a', 'Yellow'],
    ['#7ed957', 'Green'], ['#b07aff', 'Purple'], ['#ff8ac2', 'Pink'],
  ];
  function setupBalloons() {
    const zone = document.getElementById('balloon-zone');
    zone.innerHTML = '';
    let left = balloonColors.length;
    const spots = [[8, 4], [62, 2], [34, 24], [5, 48], [64, 44], [34, 66]];
    [...balloonColors].sort(() => Math.random() - .5).forEach(([c, name], i) => {
      const b = document.createElement('button');
      b.className = 'balloon';
      b.style.background = `radial-gradient(circle at 35% 30%, rgba(255,255,255,.6), transparent 55%), ${c}`;
      b.style.left = (spots[i][0] + Math.random() * 8) + '%';
      b.style.top = (spots[i][1] + Math.random() * 5) + '%';
      b.style.animationDelay = (Math.random() * 1.5) + 's';
      b.addEventListener('click', () => {
        if (b.classList.contains('popped')) return;
        b.classList.add('popped');
        sfx.pop(); speakEn(name + '!');
        if (--left === 0) {
          sfx.fanfare();
          setTimeout(advanceDay, 1000);
        }
      });
      zone.appendChild(b);
    });
  }

  // ---------- 🍚 ごはん ----------
  const foodList = [
    ['🍎', 'Apple'], ['🍙', 'Rice ball'], ['🍌', 'Banana'],
    ['🥕', 'Carrot'], ['🍞', 'Bread'], ['🍓', 'Strawberry'],
    ['🍇', 'Grapes'], ['🍅', 'Tomato'],
  ];
  function setupMeal() {
    const tray = document.getElementById('food-tray');
    tray.innerHTML = '';
    let eaten = 0;
    const picks = [...foodList].sort(() => Math.random() - .5).slice(0, 3);
    picks.forEach(([f, en]) => {
      const btn = document.createElement('button');
      btn.className = 'food'; btn.textContent = f;
      btn.addEventListener('click', () => {
        if (btn.classList.contains('eaten')) return;
        btn.classList.add('eaten');
        speakEn(en + '!');
        flyToMouth(btn, f, () => {
          eaten++;
          sfx.eat();
          speakEn(['One!', 'Two!', 'Three!'][eaten - 1], true); // たべた数を英語でカウント
          const char = document.getElementById('char-meal');
          char.classList.add('happy');
          setTimeout(() => char.classList.remove('happy'), 500);
          if (eaten === 3) setTimeout(() => completeTask('meal'), 700);
        });
      });
      tray.appendChild(btn);
    });
  }
  function flyToMouth(fromEl, emoji, onArrive) {
    const char = document.getElementById('char-meal');
    char.classList.add('open');
    const fly = document.createElement('div');
    fly.className = 'flying-food'; fly.textContent = emoji;
    const from = fromEl.getBoundingClientRect();
    const to = char.querySelector('.mouth').getBoundingClientRect();
    fly.style.left = from.left + 'px'; fly.style.top = from.top + 'px';
    document.body.appendChild(fly);
    requestAnimationFrame(() => {
      fly.style.left = to.left + 'px'; fly.style.top = to.top + 'px';
      fly.style.transform = 'scale(.2)';
    });
    setTimeout(() => { fly.remove(); char.classList.remove('open'); onArrive(); }, 520);
  }

  // ---------- 🪥 はみがき ----------
  function setupTeeth() {
    const mouth = document.getElementById('teeth-mouth');
    mouth.querySelectorAll('.germ').forEach(g => g.remove());
    let alive = 3 + Math.floor(Math.random() * 3); // 3〜5ひき
    const count = alive;
    for (let i = 0; i < count; i++) {
      const g = document.createElement('div');
      g.className = 'germ'; g.textContent = '👾';
      g.dataset.hp = 6;
      g.style.left = (6 + i * (78 / count) + Math.random() * 6) + '%';
      g.style.top = (8 + Math.random() * 20) + '%';
      mouth.appendChild(g);
    }
    const brush = document.getElementById('brush');
    let lastScrub = 0;
    function onMove(e) {
      const t = e.touches ? e.touches[0] : e;
      brush.style.display = 'block';
      brush.style.left = t.clientX + 'px'; brush.style.top = t.clientY + 'px';
      const now = Date.now();
      if (now - lastScrub > 90) { sfx.scrub(); lastScrub = now; }
      mouth.querySelectorAll('.germ:not(.dead)').forEach(g => {
        const r = g.getBoundingClientRect();
        if (t.clientX > r.left - 12 && t.clientX < r.right + 12 &&
            t.clientY > r.top - 12 && t.clientY < r.bottom + 12) {
          g.dataset.hp--;
          g.style.transform = `scale(${.3 + g.dataset.hp * .12}) rotate(${Math.random() * 40 - 20}deg)`;
          if (g.dataset.hp <= 0) {
            g.classList.add('dead'); sfx.pop(); alive--;
            if (alive === 0) {
              brush.style.display = 'none';
              speak('はが ぴかぴかに なったよ');
              setTimeout(() => completeTask('teeth'), 600);
            }
          }
        }
      });
      e.preventDefault();
    }
    mouth.ontouchmove = onMove;
    mouth.onpointermove = e => { if (e.pointerType !== 'touch' && e.buttons) onMove(e); };
    mouth.ontouchend = mouth.onpointerup = () => { brush.style.display = 'none'; };
  }

  // ---------- 🛁 おふろ ----------
  function setupBath() {
    const zone = document.getElementById('bath-zone');
    const guide = document.getElementById('bath-guide');
    const showerBtn = document.getElementById('shower-btn');
    zone.querySelectorAll('.dirt, .bubble').forEach(el => el.remove());
    showerBtn.style.visibility = 'hidden';
    guide.textContent = 'からだを なでなでして あわあわ にしてね';
    let dirty = 3;
    const spots = [[20, 30], [60, 55], [35, 70]];
    spots.forEach(([x, y]) => {
      const d = document.createElement('div');
      d.className = 'dirt'; d.textContent = '🟤';
      d.dataset.hp = 5;
      d.style.left = x + '%'; d.style.top = y + '%';
      zone.appendChild(d);
    });
    let lastBubble = 0;
    function onMove(e) {
      const t = e.touches ? e.touches[0] : e;
      const zr = zone.getBoundingClientRect();
      const now = Date.now();
      if (now - lastBubble > 120) {
        lastBubble = now; sfx.scrub();
        const b = document.createElement('div');
        b.className = 'bubble'; b.textContent = '🫧';
        b.style.left = (t.clientX - zr.left - 10) + 'px';
        b.style.top = (t.clientY - zr.top - 10) + 'px';
        zone.appendChild(b);
        // 泡はシャワーで流すまで残す(増えすぎたら古いものから消す)
        const bubbles = zone.querySelectorAll('.bubble');
        if (bubbles.length > 50) bubbles[0].remove();
      }
      zone.querySelectorAll('.dirt:not(.clean)').forEach(d => {
        const r = d.getBoundingClientRect();
        if (t.clientX > r.left - 16 && t.clientX < r.right + 16 &&
            t.clientY > r.top - 16 && t.clientY < r.bottom + 16) {
          if (--d.dataset.hp <= 0) {
            d.classList.add('clean'); sfx.pop(); dirty--;
            if (dirty === 0) {
              guide.textContent = 'シャワーで ながそう!';
              speak('シャワーで ながそう!');
              showerBtn.style.visibility = 'visible';
            }
          }
        }
      });
      e.preventDefault();
    }
    zone.ontouchmove = onMove;
    zone.onpointermove = e => { if (e.pointerType !== 'touch' && e.buttons) onMove(e); };
    showerBtn.onclick = () => {
      showerBtn.onclick = null;
      sfx.tap();
      for (let i = 0; i < 16; i++) {
        const drop = document.createElement('div');
        drop.className = 'drop'; drop.textContent = '💧';
        drop.style.left = (15 + Math.random() * 70) + 'vw';
        drop.style.top = '5vh';
        drop.style.animationDelay = (Math.random() * .5) + 's';
        document.body.appendChild(drop);
        setTimeout(() => drop.remove(), 1500);
      }
      [400, 500, 600].forEach((f, i) => tone(f, .3, i * .1, 'sine', .12));
      zone.querySelectorAll('.bubble').forEach(b => b.remove());
      speak('ぴかぴかに なったね');
      setTimeout(() => completeTask('bath'), 1200);
    };
  }

  // ---------- 🧸 おかたづけ ----------
  const toyEmojis = ['🧸', '🚗', '⚽', '🪀', '🦖', '🚂', '🎈', '🥁'];
  function setupTidy() {
    const zone = document.getElementById('tidy-zone');
    const box = document.getElementById('toy-box');
    zone.innerHTML = '';
    let left = 4;
    const picks = [...toyEmojis].sort(() => Math.random() - .5).slice(0, 4);
    const spots = [[8, 15], [60, 10], [20, 60], [65, 62]];
    picks.forEach((t, i) => {
      const btn = document.createElement('button');
      btn.className = 'toy'; btn.textContent = t;
      btn.style.left = (spots[i][0] + Math.random() * 10) + '%';
      btn.style.top = (spots[i][1] + Math.random() * 10) + '%';
      btn.addEventListener('click', () => {
        if (btn.classList.contains('stored')) return;
        btn.classList.add('stored');
        // おもちゃが箱まで飛んでいくアニメーション
        const fly = document.createElement('div');
        fly.className = 'flying-toy'; fly.textContent = t;
        const from = btn.getBoundingClientRect();
        const to = box.getBoundingClientRect();
        fly.style.left = from.left + 'px'; fly.style.top = from.top + 'px';
        document.body.appendChild(fly);
        requestAnimationFrame(() => {
          fly.style.left = (to.left + to.width / 4) + 'px';
          fly.style.top = to.top + 'px';
          fly.style.transform = 'scale(.3)';
        });
        setTimeout(() => {
          fly.remove(); sfx.pop();
          box.classList.add('bounce');
          setTimeout(() => box.classList.remove('bounce'), 200);
          if (--left === 0) setTimeout(() => completeTask('tidy'), 500);
        }, 520);
      });
      zone.appendChild(btn);
    });
  }

  // ---------- 📖 ずかん ----------
  const friendNames = {
    '🐰': 'Bunny', '🐱': 'Cat', '🐶': 'Dog', '🐼': 'Panda',
    '🐨': 'Koala', '🦁': 'Lion', '🐸': 'Frog', '🐧': 'Penguin',
    '🦊': 'Fox', '🐹': 'Hamster', '🐻': 'Bear', '🐤': 'Chick',
  };
  function renderZukan() {
    const grid = document.getElementById('zukan-grid');
    grid.innerHTML = '';
    allFriends.forEach(f => {
      const slot = document.createElement('button');
      const owned = friends.includes(f);
      slot.className = 'zukan-slot' + (owned ? '' : ' locked');
      slot.textContent = owned ? f : '❓';
      slot.addEventListener('click', () => {
        if (!owned) { sfx.tap(); return; }
        slot.classList.remove('hop');
        void slot.offsetWidth; // アニメーションを毎回リスタートさせる
        slot.classList.add('hop');
        sfx.pop();
        speakEn(friendNames[f] + '!');
      });
      grid.appendChild(slot);
    });
    document.getElementById('zukan-count').textContent =
      `おともだち ${friends.length} / ${allFriends.length}`;
  }
  document.getElementById('zukan-home-btn').addEventListener('click', () => { sfx.tap(); goHome(); });

  // ---------- 🌙 ねんね ----------
  function setupSleep() {
    const scr = document.getElementById('screen-sleep');
    const sw = document.getElementById('light-switch');
    const guide = document.getElementById('sleep-guide');
    const char = document.getElementById('char-sleep');
    scr.classList.remove('night');
    scr.querySelectorAll('.star').forEach(s => s.remove());
    char.classList.remove('sleeping');
    document.getElementById('zzz').style.display = 'none';
    sw.textContent = '💡';
    guide.textContent = 'でんきを けして ねんねさせてあげよう';
    sw.onclick = () => {
      if (scr.classList.contains('night')) return;
      scr.classList.add('night');
      char.classList.add('sleeping');
      document.getElementById('zzz').style.display = 'block';
      sw.textContent = '';
      guide.textContent = 'すやすや… おやすみなさい';
      sfx.night();
      speak('おやすみなさい');
      const area = scr.querySelector('.play-area');
      for (let i = 0; i < 8; i++) {
        const s = document.createElement('div');
        s.className = 'star'; s.textContent = '⭐';
        s.style.left = Math.random() * 90 + '%';
        s.style.top = Math.random() * 30 + '%';
        s.style.animationDelay = Math.random() * 1.5 + 's';
        area.appendChild(s);
      }
      setTimeout(() => {
        sw.textContent = '🌞';
        guide.textContent = 'おひさまを タッチして あさに しよう!';
        sw.onclick = () => {
          sw.onclick = null;
          // あさになる演出:夜が明けて、ぱっくんが目をさます
          scr.classList.remove('night');
          scr.querySelectorAll('.star').forEach(s => s.remove());
          document.getElementById('zzz').style.display = 'none';
          char.classList.remove('sleeping');
          char.classList.add('happy');
          sw.classList.add('rise');
          guide.textContent = 'あさに なったよ! おはよう! ☀️';
          speakEn('Good morning!');
          [523, 659, 784, 1047].forEach((f, i) => tone(f, .25, i * .13, 'triangle', .25));
          setTimeout(() => {
            char.classList.remove('happy');
            sw.classList.remove('rise');
            completeTask('sleep');
          }, 1800);
        };
      }, 3000);
    };
  }

  renderHome();
})();
</script>
</body>
</html>
